<script>
        const canvas = document.getElementById('partyCanvas');
        const ctx = canvas.getContext('2d');

        let fireworks = [];
        let textSceneHearts = []; 
        let backgroundStars = [];
        let finalFallingItems = []; 
        let sakuraPetals = []; 
        
        let launchFireworks = false;
        let isFinalPhase = false; 
        let isTextPhase = false; 
        let isSakuraPhase = true; 
        let currentDynamicBg = null;
        let wowEffectStarted = false;

        const stickerSources = [
            'img/a45f20c2c66f5f98d08a3dbe8d624a1e.jpg', 
            'img/e2b5d137845a9f71f288a0ff037d03dd.jpg', 
            'img/peachcat-and-goma-peachcat.gif', 
            'img/mochi-mochi-hello-white-mochi-mochi.gif'
        ];

        const fallingStickers = [];
        stickerSources.forEach(src => {
            const img = new Image();
            img.src = src;
            img.onload = () => { img.isReady = true; };
            fallingStickers.push(img);
        });

        const fallingPhrases = [
            'Жансая ✨', 'С Днем Рождения! 🎉', 'Улыбайся! 🌸', 'Твой день! 💫', 'Будь счастлива! 💐', 'Самая лучшая 👑', 'Радости! 🎂'
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (isFinalPhase && backgroundStars.length === 0) initStars();
        }
        window.addEventListener('resize', resize);

        function initSakura() {
            sakuraPetals = [];
            for (let i = 0; i < 25; i++) {
                sakuraPetals.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height, 
                    r: Math.random() * 4 + 4,
                    wobble: Math.random() * 2,
                    wobbleSpeed: Math.random() * 0.02 + 0.01,
                    speedY: Math.random() * 0.8 + 0.6,
                    speedX: Math.random() * 0.4 - 0.2
                });
            }
        }

        resize();
        initSakura();

        function initStars() {
            backgroundStars = [];
            for(let i = 0; i < 35; i++) {
                backgroundStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.015 + 0.005
                });
            }
        }

        const assetsToLoad = [
            'bg-music.mp3',
            'img/Gemini_Generated_Image_1mafej1mafej1maf.png',
            'img/happy-birthday.gif',
            'img/1.jpeg', 'img/2.jpeg', 'img/3.jpeg', 'img/4.jpeg',
            'img/5.jpeg', 'img/6.jpeg', 'img/7.jpeg', 'img/8.jpeg'
        ];
        let loadedCount = 0;
        const totalAssets = assetsToLoad.length;
        let realAssetsLoaded = false; // Флаг реальной загрузки файлов

        const progressCircle = document.getElementById('progress');
        const loaderContainer = document.getElementById('loader-container');
        const handWrapper = document.getElementById('hint-hand-wrapper');
        const loaderStatus = document.getElementById('loader-status');

        // Функция для плавной анимации процентов
        let currentPercent = 0;
        function fakeProgressAnimation() {
            // Если файлы еще качаются, плавно идем до 85%, если уже скачались — идем до 100%
            let targetPercent = realAssetsLoaded ? 100 : 85;

            if (currentPercent < targetPercent) {
                currentPercent += 1.5; // Скорость заполнения (чем меньше шаг, тем медленнее)
                if (currentPercent > targetPercent) currentPercent = targetPercent;

                let displayPercent = Math.floor(currentPercent);
                const radius = 55;
                const circumference = 2 * Math.PI * radius;
                progressCircle.style.strokeDashoffset = circumference - (displayPercent / 100) * circumference;
                loaderStatus.textContent = `Загрузка... ${displayPercent}%`;
            }

            if (currentPercent >= 100) {
                // Когда доползло до 100%, плавно скрываем лоадер и показываем кнопку
                setTimeout(() => {
                    loaderContainer.style.opacity = '0';
                    loaderContainer.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        loaderContainer.style.display = 'none';
                        handWrapper.style.display = 'block';
                        setTimeout(() => handWrapper.style.opacity = '1', 50);
                    }, 500);
                }, 400);
            } else {
                requestAnimationFrame(fakeProgressAnimation);
            }
        }

        function assetLoaded() {
            loadedCount++;
            if (loadedCount >= totalAssets) {
                realAssetsLoaded = true; // Все файлы на месте, разрешаем доползти до 100%
            }
        }

        // Запуск плавной анимации процентов
        requestAnimationFrame(fakeProgressAnimation);

        assetsToLoad.forEach(src => {
            if (src.endsWith('.mp3')) {
                const audio = new Audio();
                audio.src = src;
                audio.preload = 'auto';
                audio.oncanplaythrough = assetLoaded;
                audio.onerror = assetLoaded;
            } else {
                const img = new Image();
                img.src = src;
                img.onload = assetLoaded;
                img.onerror = assetLoaded;
            }
        });

        function animate() {
            if (currentDynamicBg) {
                ctx.fillStyle = currentDynamicBg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            
            if (isSakuraPhase) {
                sakuraPetals.forEach(p => {
                    p.y += p.speedY;
                    p.x += p.speedX + Math.sin(p.wobble) * 0.3;
                    p.wobble += p.wobbleSpeed;

                    ctx.save();
                    ctx.fillStyle = 'rgba(255, 165, 200, 0.8)';
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, p.r, p.r / 1.5, Math.PI / 4 + p.wobble, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    if (p.y > canvas.height) {
                        p.y = -15;
                        p.x = Math.random() * canvas.width;
                    }
                });
            }

            if (isTextPhase) {
                if (Math.random() < 0.06 && textSceneHearts.length < 15) {
                    textSceneHearts.push({
                        x: Math.random() * canvas.width,
                        y: canvas.height + 20,
                        size: Math.random() * 10 + 12,
                        speedY: Math.random() * 0.8 + 0.5,
                        angle: Math.random() * Math.PI,
                        color: ['rgba(0,255,255,0.7)', 'rgba(255,0,127,0.7)', 'rgba(157,0,255,0.7)', 'rgba(255,255,0,0.7)'][Math.floor(Math.random() * 4)]
                    });
                }
                textSceneHearts.forEach((h, idx) => {
                    h.y -= h.speedY; h.angle += 0.01;
                    let currentX = h.x + Math.sin(h.angle) * 10;
                    ctx.save(); 
                    ctx.fillStyle = h.color;
                    ctx.beginPath(); ctx.moveTo(currentX, h.y);
                    ctx.bezierCurveTo(currentX - h.size/2, h.y - h.size/2, currentX - h.size, h.y + h.size/3, currentX, h.y + h.size);
                    ctx.bezierCurveTo(currentX + h.size, h.y + h.size/3, currentX + h.size/2, h.y - h.size/2, currentX, h.y);
                    ctx.fill(); ctx.restore();
                    if (h.y < -30) textSceneHearts.splice(idx, 1);
                });
            }

            if (launchFireworks && Math.random() < 0.06) {
                fireworks.push(new Firework(Math.random() * canvas.width * 0.8 + canvas.width * 0.1, Math.random() * canvas.height * 0.3 + canvas.height * 0.1));
            }
            fireworks.forEach((fw, idx) => { fw.update(); fw.draw(); if (fw.particles.length === 0) fireworks.splice(idx, 1); });

            if (isFinalPhase) {
                backgroundStars.forEach(s => {
                    s.alpha += s.speed; if(s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
                    ctx.save(); ctx.globalAlpha = Math.max(0, s.alpha); ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                });

                if (Math.random() < 0.04 && finalFallingItems.length < 12) { 
                    const isWord = Math.random() < 0.6; 
                    let chosenSticker = fallingStickers[Math.floor(Math.random() * fallingStickers.length)];
                    
                    if (isWord || (chosenSticker && chosenSticker.isReady)) {
                        finalFallingItems.push({
                            x: Math.random() * (canvas.width - 140) + 20,
                            y: -80,
                            type: isWord ? 'word' : 'sticker',
                            content: isWord ? fallingPhrases[Math.floor(Math.random() * fallingPhrases.length)] : chosenSticker,
                            fontSize: Math.floor(Math.random() * 3) + 14, 
                            size: Math.floor(Math.random() * 15) + 40,   
                            speedY: Math.random() * 0.5 + 0.9,           
                            wobble: Math.random() * 2,
                            wobbleSpeed: Math.random() * 0.01 + 0.005
                        });
                    }
                }

                finalFallingItems.forEach((item, idx) => {
                    item.y += item.speedY;
                    item.wobble += item.wobbleSpeed;
                    let currentX = item.x + Math.sin(item.wobble) * 10;

                    ctx.save();
                    ctx.globalAlpha = 0.65;
                    
                    if (item.type === 'word') {
                        ctx.font = `600 ${item.fontSize}px sans-serif`;
                        let textWidth = ctx.measureText(item.content).width;
                        let paddingX = 12; 
                        let paddingY = 8;
                        let rectW = textWidth + paddingX * 2;
                        let rectH = item.fontSize + paddingY * 2;

                        ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                        ctx.lineWidth = 1.2;
                        ctx.beginPath();
                        ctx.roundRect(currentX, item.y, rectW, rectH, 10);
                        ctx.fill();
                        ctx.stroke();

                        ctx.fillStyle = '#ffffff';
                        ctx.fillText(item.content, currentX + paddingX, item.y + paddingY + item.fontSize - 2);
                    } else {
                        ctx.drawImage(item.content, currentX, item.y, item.size, item.size);
                    }
                    ctx.restore();

                    if (item.y > canvas.height + 100) finalFallingItems.splice(idx, 1);
                });
            }

            requestAnimationFrame(animate);
        }

        class Firework {
            constructor(x, y) {
                this.x = x; this.y = y; this.particles = [];
                const colors = ['#00ffff', '#ff007f', '#9d00ff', '#ffff00'];
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2; 
                    const speed = Math.random() * 2.5 + 1.0; 
                    this.particles.push({
                        x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        alpha: 1, decay: Math.random() * 0.015 + 0.01, color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }
            }
            update() {
                this.particles.forEach((p, idx) => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.012; p.alpha -= p.decay;
                    if (p.alpha <= 0) this.particles.splice(idx, 1);
                });
            }
            draw() {
                this.particles.forEach(p => {
                    ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                });
            }
        }

        function startWowEffect() {
            if (wowEffectStarted) return;
            wowEffectStarted = true;

            const audio = document.getElementById('bgAudio');
            if (audio) {
                audio.play().catch(e => console.log(e));
            }

            handWrapper.style.opacity = '0';
            setTimeout(() => handWrapper.style.display = 'none', 500);
            
            isSakuraPhase = false; 
            isTextPhase = true; 
            
            const cloud = document.getElementById('text-cloud-container');
            cloud.style.display = 'flex';
            setTimeout(() => { cloud.style.opacity = '1'; cloud.style.transform = 'scale(1)'; }, 50);

            showCongratsWowSteps();
            setTimeout(() => launchFireworks = true, 300); 
            
            setTimeout(() => {
                goToFinalPhase();
            }, 13000); 
        }

        function showCongratsWowSteps() {
            const title = document.getElementById('congrats-title');
            const cloud = document.getElementById('text-cloud-container');
            
            currentDynamicBg = '#ffb3c6'; 
            cloud.style.boxShadow = "0 0 20px #ff007f";
            title.textContent = "HAPPY"; 
            title.style.color = "#ffffff"; 
            title.style.textShadow = "0 0 15px #ff007f";
            setTimeout(() => title.classList.add('show-wow-text'), 100);
            
            setTimeout(() => {
                title.classList.remove('show-wow-text');
                setTimeout(() => {
                    currentDynamicBg = '#9d00ff'; 
                    cloud.style.boxShadow = "0 0 20px #ffff00";
                    title.textContent = "BIRTHDAY"; 
                    title.style.textShadow = "0 0 15px #ffff00";
                    title.classList.add('show-wow-text');
                }, 400); 
            }, 3000);

            setTimeout(() => {
                title.classList.remove('show-wow-text');
                setTimeout(() => {
                    currentDynamicBg = '#ff007f'; 
                    cloud.style.boxShadow = "0 0 20px #00ffff";
                    title.textContent = "TO"; 
                    title.style.textShadow = "0 0 15px #00ffff";
                    title.classList.add('show-wow-text');
                }, 400);
            }, 6000);

            setTimeout(() => {
                title.classList.remove('show-wow-text');
                setTimeout(() => {
                    currentDynamicBg = '#160121'; 
                    cloud.style.boxShadow = "0 0 25px #d4af37";
                    cloud.style.border = "1.5px solid #d4af37";
                    title.textContent = "JANSAYA!"; 
                    title.style.textShadow = "0 0 15px #d4af37, 0 0 30px #ff007f";
                    title.classList.add('show-wow-text'); 
                }, 400);
            }, 9000);
        }

        function goToFinalPhase() {
            isFinalPhase = true;
            initStars();

            document.getElementById('text-cloud-container').style.display = 'none';
            launchFireworks = false; fireworks = []; isTextPhase = false; textSceneHearts = [];
            currentDynamicBg = null; 
            
            document.getElementById('sky-bg').style.opacity = '0'; 
            document.getElementById('final-bg-stars').style.opacity = '1'; 

            const finalText = document.getElementById('final-simple-text');
            const sticker = document.getElementById('final-sticker-wrapper');
            
            setTimeout(() => {
                finalText.style.display = 'block'; sticker.style.display = 'block';
                setTimeout(() => { finalText.style.opacity = '1'; sticker.style.opacity = '1'; }, 50);
                
                setTimeout(() => {
                    finalText.style.transform = 'translateY(-26vh) scale(0.8)';
                    sticker.style.transform = 'translateY(-22vh) scale(0.9)'; 
                    setTimeout(() => { showAlbumScene(); }, 500);
                }, 3500);

            }, 2000); 
        }

        function showAlbumScene() {
            const scene = document.getElementById('final-scene-container');
            scene.style.display = 'flex';
            setTimeout(() => { 
                scene.style.opacity = '1'; 
                document.getElementById('top-message-box').style.opacity = '1';
                document.getElementById('top-message-box').style.transform = 'translateY(0)';
            }, 100);
            initNewBookLogic();
        }

        function initNewBookLogic() {
            const pages = document.querySelectorAll('.page');
            const book = document.getElementById('book');

            let currentPageIndex = 0; 

            const slideTexts = [
                "Жансая, с днем рождения! Пусть этот день станет началом твоего самого яркого, вдохновляющего и счастливого года ✨", 
                "Пусть жизнь будет наполнена абсолютной гармонией, внутренней уверенностью и моментами, от которых искренне замирает сердце 💖", 
                "Пусть открываются все самые лучшие возможности, а каждый сделанный шаг ведет к исполнению больших и заветных мечтаний 🌸", 
                "Желаем бесконечного благополучия, тепла искренних людей вокруг и абсолютного счастья в каждой секунде. С праздником! 💐", 
                "Пусть улыбка никогда не сходит с твоего лица, а каждый новый день приносит яркие эмоции и приятные сюрпризы 🌟" 
            ];

            function updateZIndices() {
                pages.forEach((page, index) => {
                    if (page.classList.contains('flipped')) {
                        page.style.zIndex = index + 1;
                    } else {
                        page.style.zIndex = pages.length - index + 1;
                    }
                });
            }

            function updateUI() {
                if (window.innerWidth < 600) {
                    book.style.transform = "translateX(0px)";
                } else {
                    if (currentPageIndex > 0) {
                        book.style.transform = "translateX(105px)";
                    } else {
                        book.style.transform = "translateX(0px)";
                    }
                }

                if (slideTexts[currentPageIndex]) {
                    document.getElementById('slide-text').textContent = slideTexts[currentPageIndex];
                }
            }

            book.addEventListener('click', (e) => {
                const rect = book.getBoundingClientRect();
                const clickX = e.clientX - rect.left; 

                if (clickX > rect.width / 2) {
                    if (currentPageIndex < pages.length) {
                        const pageToFlip = pages[currentPageIndex];
                        pageToFlip.classList.add('flipped');
                        currentPageIndex++;
                        setTimeout(updateZIndices, 300);
                        updateUI();
                    }
                } 
                else {
                    if (currentPageIndex > 0) {
                        currentPageIndex--;
                        const pageToUnflip = pages[currentPageIndex];
                        pageToUnflip.classList.remove('flipped');
                        setTimeout(updateZIndices, 300);
                        updateUI();
                    }
                }
            });

            window.addEventListener('resize', updateUI);

            updateZIndices();
            updateUI();
        }

        requestAnimationFrame(animate);
    </script>
